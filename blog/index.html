春天櫻花盛開，夏天綠意盎然，秋天楓葉轉紅，冬天雲霧飄渺。每個季節都有不同的美。

        content: `花東縱谷被譽為台灣的最後一片淨土。這裡遠離都市的喧囂，保留了台灣最原始的自然風貌和原住民文化。

必訪景點：

【太魯閣國家公園】
- 燕子口：峭壁中的步道，驚險刺激
- 天祥：台灣最美的山水結合

【七星潭】
- 台灣東部最美的海灘
- 清澈的海水和細軟的鵝卵石
- 傍晚是攝影最佳時刻

【池上伯朗大道】
- 金黃稻浪迎風搖曳
- 台灣最美的田園風景
- 騎自行車遊覽最佳

【三仙台】
- 三座仙人島嶼
- 八拱跨海大橋
- 朝日與夕陽都很壯觀

包車遊花東的優勢：

        content: `宜蘭是台灣少數同時擁有山、海、溫泉、美食的地方。從台北出發不到一小時就能到達，是週末包車的最佳選擇。

【礁溪溫泉】
台灣少有的平原溫泉。溫度約58℃，富含礦物質。

景點推薦：
- 礁溪溫泉公園：免費泡腳
- 礁溪溫泉飯店：享受設施齐全的溫泉體驗

      {
        id: 6,
        title: '春季限定｜嘉義瑞里紫藤花一日遊・太平雲梯雙主題攻略',
        date: '2026-04-28',
        author: '賀森包車',
        category: '嘉義旅遊',
        emoji: '🌸',
        image: 'images/ruili/cover.jpg',
        excerpt: '四月的嘉義，藏著台灣版的「紫色浪漫」。瑞里印象咖啡莊園的紫藤花海搭配太平雲梯的壯闊山景，一趟讓人忘記煩惱、只想沉浸在美景裡的完美一日遊，就這樣悄悄展開了...',
        content: `四月的嘉義，藏著台灣版的紫色浪漫。

每年春天，當山城瑞里的紫藤花開，整片花牆如夢似幻地垂落，那一串串飽滿的紫色花穗，不輸日本藤花祭的美景。賀森包車這次帶著大家，從中部出發南下嘉義，先追花、再探橋，走一趟讓人忘記煩惱的春日一日遊。

【第一站：瑞里印象民宿咖啡莊園】

[IMAGE:images/ruili/sign.jpg]

瑞里印象是當地人氣最旺的紫藤花打卡點，莊園庭園裡種滿了成熟的紫藤，花期時整面牆被淡紫色覆蓋，配上莊園特有的日式木造建築，美得像一幅畫。

來這裡一定要做的事：
- 在紫藤花牆前拍個夠，每個角度都是大片
- 坐在戶外座位點杯咖啡，頭上就是滿滿的花
- 與莊園內的熊賀咖可愛裝置合拍留念

[IMAGE:images/ruili/portrait.jpg]

【在花棚下喝咖啡，時間好像慢下來了】

莊園設有戶外咖啡座，頭頂上的紫藤就這樣垂落下來，泡著茶、翻著雜誌，耳邊是鳥叫聲，鼻尖飄著花香——這種愜意，是城市裡找不到的。

[IMAGE:images/ruili/cafe.jpg]

莊園內還有一個超夢幻的粉色鐵框打卡區，兩隻大熊熊守護著粉色鞦韆，紫藤從上方垂落，是整趟行程最讓人捨不得離開的角落，旅客們在這裡拍了又拍，完全停不下來！

【第二站：太平雲梯】

吃飽賞花之後，我們驅車前往嘉義另一個震撼人心的景點——太平雲梯。

[IMAGE:images/ruili/bridge.jpg]

這座全長281公尺的高山吊橋，懸掛在山谷之間，踩上去微微搖晃，底下是連綿的翠綠山景，視野遼闊到讓人心曠神怡。橋頭還有一隻帥氣的不鏽鋼犀牛藝術裝置，非常吸睛。

太平雲梯亮點：
- 全台最長高山吊橋之一，山谷景觀壯觀震撼
- 清晨天氣好時有機會看到雲海，像走在天空中
- 橋頭不鏽鋼犀牛裝置是超人氣打卡點

[IMAGE:images/ruili/group.jpg]

      if (blogPosts.length === 0) {

          <div style="grid-column: 1 / -1;" class="blog-empty">

          </div>
        `;
        return;
      }

      const sorted = [...blogPosts].sort((a, b) => new Date(b.date) - new Date(a.date));
      container.innerHTML = sorted.map(post => `
        <article class="blog-card" onclick="expandPost(${post.id})">
          <div class="blog-thumbnail">${post.image ? `<img src="${post.image}" alt="${post.title}">` : post.emoji}</div>
          <div class="blog-content">
            <div class="blog-meta">
              <span>📅 ${new Date(post.date).toLocaleDateString('zh-Hant-TW')}</span>
              <span>✍️ ${post.author}</span>
              <span>📂 ${post.category}</span>
            </div>
            <h3>${post.title}</h3>
            <p>${post.excerpt}</p>
            <a href="#" class="blog-link" onclick="expandPost(${post.id}); return false;">閱讀全文 →</a>
          </div>
        </article>
      `).join('');
    }

    // 解析內文段落為 HTML
    function renderContent(content) {
      return content.split('\n\n').map(para => {
        const t = para.trim();
        if (!t) return '';
        if (t.startsWith('[IMAGE:')) {
          const m = t.match(/\[IMAGE:(.+?)\]/);
          return m ? '<figure><img src="' + m[1] + '" alt=""></figure>' : '';
        }
        if (t.startsWith('【')) {
          const title = t.match(/【(.+?)】/)[1];
          const body = t.replace(/【.+?】/, '').trim();
          return '<h2>' + title + '</h2>' + (body ? '<p>' + body + '</p>' : '');
        }
        if (t.startsWith('-') || t.startsWith('✓')) {
          const items = t.split('\n').map(i => '<li>' + i.replace(/^[-✓\s]+/, '') + '</li>').join('');
          return '<ul>' + items + '</ul>';
        }
        return '<p>' + t + '</p>';
      }).join('');
    }

    // 展開文章（Modal 方式）
    function expandPost(id) {
      const post = blogPosts.find(p => p.id === id);
      if (!post) return;

      document.getElementById('articleContent').innerHTML =
        '<div class="article-hero">' +
          '<h1>' + post.emoji + ' ' + post.title + '</h1>' +
