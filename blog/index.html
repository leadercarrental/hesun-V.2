                <span>📂 ${post.category}</span>
              </div>
            </header>

            <main class="article-content">
              ${post.content.split('\\n\\n').map(para => {
                if (para.trim().startsWith('【')) {
                  // Handle sections starting with 【
                  const title = para.match(/【(.+?)】/)[1];
                  const content = para.replace(/【.+?】/, '').trim();
                  return '<h2>' + title + '</h2><p>' + content + '</p>';
                } else if (para.trim().startsWith('-') || para.trim().startsWith('✓')) {
                  // Handle lists
                  const items = para.trim().split('\\n');
                  const listItems = items.map(item => '<li>' + item.replace(/^[-✓\\s]+/, '') + '</li>').join('');
                  return '<ul>' + listItems + '</ul>';
                } else {
                  return '<p>' + para.trim() + '</p>';
                }
              }).join('')}
