<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找不到頁面 | 賀森包車旅遊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background:
        radial-gradient(ellipse at center, rgba(212,175,55,0.15), transparent 50%),
        linear-gradient(135deg, #0a0a0a 0%, #161208 100%);
    }
    .nf { max-width: 600px; }
    .nf h1 {
      font-family: var(--ff-display);
      font-size: clamp(6rem, 18vw, 10rem);
      background: var(--gold-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 20px;
    }
    .nf h2 {
      font-family: var(--ff-serif);
      letter-spacing: 3px;
      margin-bottom: 20px;
    }
    .nf p { color: var(--text-muted); margin-bottom: 30px; }
  </style>
</head>
<body>
  <div class="nf">
    <h1>404</h1>
    <h2>找不到這個頁面</h2>
    <p>您所尋找的頁面不存在,或者已經被移動了。</p>
    <a href="/" class="btn btn-primary">回到首頁</a>
  </div>
</body>
</html>
